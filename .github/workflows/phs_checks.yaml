on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: phs_checks.yaml

jobs:
  # Initial job to post status
  init:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Create initial status check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              description: 'Package checks in progress',
              context: 'PHS Package Checks'
            });
  Style:
    uses: Public-Health-Scotland/actions/.github/workflows/phs_style.yaml@test_air
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
  Document:
    needs: [Style]
    uses: Public-Health-Scotland/actions/.github/workflows/phs_document.yaml@test_air
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
  R-CMD-check-core:
    needs: [Style, Document]
    uses: Public-Health-Scotland/actions/.github/workflows/phs_R-CMD-check-core.yaml@test_air
    permissions:
      contents: read
    secrets: inherit
    concurrency:
      group: ${{ inputs.limit_parallel == false && format('r-cmd-check-{0}-{1}', github.workflow, github.run_id) || 'phs-core-check-queue' }}
      cancel-in-progress: false
  R-CMD-check-extended:
    needs: [R-CMD-check-core]
    uses: Public-Health-Scotland/actions/.github/workflows/phs_R-CMD-check-extended.yaml@test_air
    permissions:
      contents: read
    secrets: inherit
    concurrency:
      group: ${{ inputs.limit_parallel == false && format('r-cmd-check-{0}-{1}', github.workflow, github.run_id) || 'package-checks-queue' }}
      cancel-in-progress: false
  R-CMD-check-no-suggests:
    needs: [R-CMD-check-extended]
    uses: Public-Health-Scotland/actions/.github/workflows/phs_R-CMD-check-no-suggests.yaml@test_air
    permissions:
      contents: read
    secrets: inherit
    concurrency:
      group: ${{ inputs.limit_parallel == false && format('r-cmd-check-{0}-{1}', github.workflow, github.run_id) || 'package-checks-queue' }}
      cancel-in-progress: false
  pkgdown:
    needs: [Document]
    uses: Public-Health-Scotland/actions/.github/workflows/phs_pkgdown.yaml@test_air
    permissions:
      contents: write
    secrets: inherit

  # Final job to update status
  finalize:
    needs: [Style, Document, R-CMD-check-core, pkgdown]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      statuses: write
    steps:
      - name: Update final status
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const allSuccess = ${{ needs.Style.result == 'success' &&
                                    needs.Document.result == 'success' &&
                                    needs.R-CMD-check-core.result == 'success'}};
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: allSuccess ? 'success' : 'failure',
              description: allSuccess ? 'All checks passed' : 'Some checks failed',
              context: 'PHS Package Checks'
            });
